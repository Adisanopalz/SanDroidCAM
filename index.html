<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SanDroCAM - Pro Web Virtual Camera</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        dark: {
                            900: '#09090b', // Zinc 950
                            800: '#18181b', // Zinc 900
                            700: '#27272a', // Zinc 800
                        },
                        neon: {
                            purple: '#a855f7',
                            blue: '#3b82f6',
                            cyan: '#06b6d4',
                            red: '#ef4444'
                        }
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                        'blob': 'blob 7s infinite',
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 1, boxShadow: '0 0 15px rgba(239, 68, 68, 0.6)' },
                            '50%': { opacity: .5, boxShadow: '0 0 2px rgba(239, 68, 68, 0.2)' },
                        },
                        fadeInUp: {
                            '0%': { opacity: 0, transform: 'translateY(20px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #09090b;
            color: #f8fafc;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Page Transitions */
        .page {
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(0.98) translateY(10px);
            display: flex;
            flex-direction: column;
        }
        .page.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);
            z-index: 10;
        }

        /* Glassmorphism Utilities */
        .glass {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-button {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .glass-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .glass-button:active {
            transform: translateY(0);
        }

        /* Video Setup */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #000;
        }
        .obs-mode video {
            object-fit: contain; /* Prevent cropping in OBS */
        }

        /* Hide UI dynamically in OBS */
        .idle-hide {
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .is-idle .idle-hide {
            opacity: 0 !important;
            transform: translateY(-10px);
            pointer-events: none;
        }
        
        /* Hide scrollbars */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="w-screen h-screen antialiased selection:bg-neon-purple selection:text-white">

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 transition-all duration-400 opacity-0 -translate-y-8 pointer-events-none">
        <div class="glass px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 border-l-4 border-l-neon-blue">
            <div id="toast-icon" class="text-xl">✨</div>
            <div id="toast-message" class="text-sm font-medium tracking-wide">Ready to connect!</div>
        </div>
    </div>

    <div id="page-home" class="page active bg-dark-900 overflow-hidden">
        <!-- Animated Background Blobs -->
        <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
            <div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-neon-purple/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob"></div>
            <div class="absolute top-[20%] right-[-10%] w-[35vw] h-[35vw] bg-neon-cyan/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob" style="animation-delay: 2s;"></div>
            <div class="absolute bottom-[-20%] left-[20%] w-[45vw] h-[45vw] bg-neon-blue/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob" style="animation-delay: 4s;"></div>
        </div>

        <div class="relative z-10 flex flex-col items-center justify-center h-full px-6 w-full max-w-5xl mx-auto">
            
            <!-- Logo & Title -->
            <div class="text-center mb-12 animate-fade-in-up">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-neon-purple to-neon-blue mb-4 shadow-[0_0_40px_rgba(168,85,247,0.4)]">
                    <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                </div>
                <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-3">
                    SanDro<span class="text-transparent bg-clip-text bg-gradient-to-r from-neon-cyan to-neon-blue">CAM</span>
                </h1>
                <p class="text-gray-400 text-sm md:text-base max-w-md mx-auto">Pro-grade virtual camera via WebRTC. Low latency, zero install, ready for OBS.</p>
            </div>

            <!-- Action Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl animate-fade-in-up" style="animation-delay: 0.1s;">
                
                <!-- SENDER CARD -->
                <button onclick="app.startSenderMode()" class="group relative flex flex-col items-center p-8 rounded-3xl glass transition-all hover:bg-white/[0.03] hover:border-neon-purple/50 focus:outline-none focus:ring-2 focus:ring-neon-purple text-left w-full">
                    <div class="absolute inset-0 bg-gradient-to-b from-neon-purple/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity rounded-3xl pointer-events-none"></div>
                    <div class="w-14 h-14 rounded-full bg-neon-purple/20 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                        <svg class="w-7 h-7 text-neon-purple" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    </div>
                    <h3 class="text-xl font-semibold text-white mb-2">Host Camera</h3>
                    <p class="text-xs text-gray-400 text-center">Ubah HP ini menjadi sumber kamera nirkabel beresolusi tinggi.</p>
                </button>

                <!-- RECEIVER CARD -->
                <div class="flex flex-col rounded-3xl glass transition-all hover:border-neon-cyan/50 overflow-hidden w-full relative">
                    <button id="btn-show-receiver" onclick="app.showReceiverMenu()" class="group relative flex flex-col items-center p-8 w-full h-full focus:outline-none hover:bg-white/[0.03]">
                        <div class="w-14 h-14 rounded-full bg-neon-cyan/20 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                            <svg class="w-7 h-7 text-neon-cyan" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        </div>
                        <h3 class="text-xl font-semibold text-white mb-2">Monitor / OBS</h3>
                        <p class="text-xs text-gray-400 text-center">Terima sinyal video untuk ditampilkan di layar atau OBS Studio.</p>
                    </button>
                    
                    <!-- Hidden Input Area for Receiver -->
                    <div id="receiver-input-section" class="hidden absolute inset-0 bg-dark-800/95 backdrop-blur-xl flex-col items-center justify-center p-6 border-t border-white/5 rounded-3xl z-20">
                        <p class="text-sm text-gray-300 mb-3 font-medium">Enter Room ID :</p>
                        <div class="flex flex-col gap-3 w-full max-w-[200px]">
                            <input type="text" id="join-room-id" placeholder="cam-xxxx" class="w-full px-4 py-3 bg-dark-900 border border-dark-700 rounded-xl focus:outline-none focus:border-neon-cyan text-white text-center font-mono tracking-widest shadow-inner transition-colors">
                            <button onclick="app.startReceiverMode()" class="w-full px-4 py-3 bg-neon-cyan hover:bg-cyan-400 text-dark-900 rounded-xl font-bold transition-all shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                                Connect
                            </button>
                            <button onclick="app.hideReceiverMenu()" class="text-xs text-gray-500 hover:text-gray-300 mt-2">Batal</button>
                        </div>
                    </div>
                </div>

            </div>
            
            <div class="absolute bottom-8 text-gray-500 text-xs text-center w-full animate-fade-in-up" style="animation-delay: 0.2s;">
                Buka URL ini di HP dan PC Anda secara bersamaan.
            </div>
        </div>
    </div>

    <div id="page-sender" class="page bg-black">
        <video id="sender-video" autoplay playsinline muted></video>
        
        <!-- Sender UI Overlay -->
        <div class="absolute inset-0 flex flex-col justify-between pointer-events-none z-20">
            
            <!-- Top Bar -->
            <div class="p-6 flex justify-between items-start bg-gradient-to-b from-black/70 to-transparent pb-10">
                <!-- Status Badge -->
                <div class="glass px-4 py-2 rounded-full pointer-events-auto flex items-center gap-3">
                    <div class="relative flex h-3 w-3">
                        <span id="sender-status-ping" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                        <span id="sender-status-dot" class="relative inline-flex rounded-full h-3 w-3 bg-yellow-500"></span>
                    </div>
                    <span id="sender-status-text" class="text-sm font-semibold text-gray-200">Starting...</span>
                </div>
                
                <!-- Room ID & Copy -->
                <div class="glass rounded-2xl pointer-events-auto flex items-center overflow-hidden border-neon-purple/30">
                    <div class="px-4 py-2 border-r border-white/10 bg-white/5">
                        <div class="text-[10px] text-gray-400 uppercase tracking-wider mb-0.5">Room ID</div>
                        <code id="sender-room-id" class="text-lg font-mono font-bold text-neon-purple">----</code>
                    </div>
                    <button onclick="app.copyObsLink()" class="px-4 py-3 hover:bg-neon-purple/20 transition-colors group h-full flex items-center justify-center" title="Copy OBS Link">
                        <svg class="w-5 h-5 text-gray-300 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Bottom Controls -->
            <div class="p-8 flex justify-center items-center gap-8 bg-gradient-to-t from-black/80 to-transparent pt-12 pointer-events-auto">
                <button onclick="app.stopApp()" class="glass-button w-14 h-14 rounded-full flex items-center justify-center group">
                    <svg class="w-6 h-6 text-gray-400 group-hover:text-neon-red transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                
                <!-- Fake Shutter Button for aesthetics -->
                <div class="w-20 h-20 rounded-full border-4 border-white/20 p-1 flex items-center justify-center">
                    <div class="w-full h-full rounded-full bg-white/10 flex items-center justify-center">
                       <div class="w-3 h-3 rounded-full bg-neon-red shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div>
                    </div>
                </div>

                <button onclick="app.toggleCamera()" class="glass-button w-14 h-14 rounded-full flex items-center justify-center group">
                    <svg class="w-6 h-6 text-gray-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="page-receiver" class="page bg-transparent obs-mode">
        <!-- We use transparent background here in case OBS user wants to key it, though video covers it -->
        <video id="receiver-video" autoplay playsinline></video>
        
        <!-- Cinematic Loading State -->
        <div id="receiver-loading" class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-dark-900/90 backdrop-blur-md idle-hide">
            <div class="relative w-24 h-24 mb-6">
                <!-- Outer spinning rings -->
                <div class="absolute inset-0 border-4 border-t-neon-cyan border-r-transparent border-b-neon-purple border-l-transparent rounded-full animate-spin-slow"></div>
                <div class="absolute inset-2 border-4 border-r-neon-blue border-l-transparent border-t-transparent border-b-transparent rounded-full animate-spin-slow" style="animation-direction: reverse; animation-duration: 2s;"></div>
                <!-- Inner pulse -->
                <div class="absolute inset-6 bg-white/5 rounded-full animate-pulse flex items-center justify-center">
                    <svg class="w-6 h-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
            </div>
            <h2 id="receiver-status-text" class="text-xl font-bold text-white tracking-wide">Awaiting Signal...</h2>
            <p class="text-gray-400 mt-2 text-sm">Ensure your phone is on the SanDroCAM host page.</p>
        </div>

        <!-- Float Controls (Auto Hide for clean OBS feed) -->
        <div class="absolute top-6 right-6 z-20 flex gap-3 idle-hide pointer-events-auto">
            <div class="glass px-3 py-1.5 rounded-lg flex items-center gap-2 border-neon-cyan/20">
                <div class="w-2 h-2 rounded-full bg-neon-cyan animate-pulse"></div>
                <span class="text-[10px] font-mono font-bold text-neon-cyan tracking-widest uppercase">Live Link</span>
            </div>
            <button onclick="app.stopApp()" class="glass-button p-2 rounded-lg hover:bg-neon-red/20 hover:border-neon-red/50 transition-colors group">
                <svg class="w-5 h-5 text-gray-400 group-hover:text-neon-red" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const app = {
            peer: null,
            conn: null,
            localStream: null,
            currentFacingMode: 'environment', // Default back camera
            isSender: false,
            roomId: null,
            idleTimeout: null,

            // Elements Mapping
            els: {
                pageHome: document.getElementById('page-home'),
                pageSender: document.getElementById('page-sender'),
                pageReceiver: document.getElementById('page-receiver'),
                senderVideo: document.getElementById('sender-video'),
                receiverVideo: document.getElementById('receiver-video'),
                roomIdDisplay: document.getElementById('sender-room-id'),
                senderStatusText: document.getElementById('sender-status-text'),
                senderStatusDot: document.getElementById('sender-status-dot'),
                senderStatusPing: document.getElementById('sender-status-ping'),
                receiverStatusText: document.getElementById('receiver-status-text'),
                receiverLoading: document.getElementById('receiver-loading'),
                receiverInputSec: document.getElementById('receiver-input-section'),
                joinInput: document.getElementById('join-room-id'),
                toast: document.getElementById('toast'),
                toastMsg: document.getElementById('toast-message'),
                toastIcon: document.getElementById('toast-icon')
            },

            init() {
                // Check if opened via OBS Link (URL parameters)
                const urlParams = new URLSearchParams(window.location.search);
                const mode = urlParams.get('mode');
                const room = urlParams.get('room');

                if (mode === 'receiver' && room) {
                    this.els.joinInput.value = room;
                    this.startReceiverMode();
                }

                // Setup idle cursor hiding for OBS Mode
                document.addEventListener('mousemove', () => this.resetIdleTimer());
                document.addEventListener('touchstart', () => this.resetIdleTimer());
                
                // Allow pressing Enter to join
                this.els.joinInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.startReceiverMode();
                });
            },

            showToast(msg, type = 'info') {
                this.els.toastMsg.innerText = msg;
                
                // Styling based on type
                this.els.toast.className = `fixed top-6 left-1/2 -translate-x-1/2 z-50 transition-all duration-400 transform`;
                let borderClass = 'border-l-neon-blue';
                
                if (type === 'success') {
                    this.els.toastIcon.innerText = '✨';
                    borderClass = 'border-l-neon-purple';
                } else if (type === 'error') {
                    this.els.toastIcon.innerText = '⚠️';
                    borderClass = 'border-l-neon-red';
                } else {
                    this.els.toastIcon.innerText = 'ℹ️';
                }
                
                this.els.toast.firstElementChild.className = `glass px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 border-l-4 ${borderClass}`;
                
                // Animate in
                requestAnimationFrame(() => {
                    this.els.toast.classList.remove('opacity-0', '-translate-y-8');
                    this.els.toast.classList.add('opacity-100', 'translate-y-0');
                });
                
                // Auto hide
                setTimeout(() => {
                    this.els.toast.classList.remove('opacity-100', 'translate-y-0');
                    this.els.toast.classList.add('opacity-0', '-translate-y-8');
                }, 3500);
            },

            switchPage(pageId) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
            },

            showReceiverMenu() {
                this.els.receiverInputSec.classList.remove('hidden');
                this.els.receiverInputSec.classList.add('flex');
                setTimeout(() => this.els.joinInput.focus(), 100);
            },
            
            hideReceiverMenu() {
                this.els.receiverInputSec.classList.add('hidden');
                this.els.receiverInputSec.classList.remove('flex');
            },

            generateRoomId() {
                // E.g., cam-x7y9z1 (6 random chars for sleekness but enough uniqueness)
                return 'cam-' + Math.random().toString(36).substring(2, 8);
            },
            
            updateSenderStatus(text, colorClass, ping = false) {
                this.els.senderStatusText.innerText = text;
                this.els.senderStatusDot.className = `relative inline-flex rounded-full h-3 w-3 ${colorClass}`;
                
                if (ping) {
                    this.els.senderStatusPing.className = `animate-ping absolute inline-flex h-full w-full rounded-full ${colorClass} opacity-75`;
                    this.els.senderStatusPing.style.display = 'block';
                    // Special Live glowing effect
                    if (colorClass.includes('red')) {
                        this.els.senderStatusDot.classList.add('animate-pulse-glow');
                    }
                } else {
                    this.els.senderStatusPing.style.display = 'none';
                    this.els.senderStatusDot.classList.remove('animate-pulse-glow');
                }
            },

            async startSenderMode() {
                this.isSender = true;
                this.roomId = this.generateRoomId();
                this.switchPage('page-sender');
                
                try {
                    await this.initLocalCamera();
                    this.initPeerServer(this.roomId);
                } catch (err) {
                    this.showToast('Camera access denied or unavailable.', 'error');
                    this.stopApp();
                }
            },

            async initLocalCamera() {
                if (this.localStream) {
                    this.localStream.getTracks().forEach(track => track.stop());
                }

                const constraints = {
                    video: {
                        facingMode: this.currentFacingMode,
                        width: { ideal: 1920 }, // Pushed for better quality
                        height: { ideal: 1080 },
                        frameRate: { ideal: 30 }
                    },
                    audio: true
                };

                this.localStream = await navigator.mediaDevices.getUserMedia(constraints);
                this.els.senderVideo.srcObject = this.localStream;
                
                // Mirror if front camera
                if (this.currentFacingMode === 'user') {
                    this.els.senderVideo.style.transform = 'scaleX(-1)';
                } else {
                    this.els.senderVideo.style.transform = 'scaleX(1)';
                }
            },

            async toggleCamera() {
                this.currentFacingMode = this.currentFacingMode === 'environment' ? 'user' : 'environment';
                await this.initLocalCamera();
                
                // Replace track seamlessly if connected
                if (this.conn && this.conn.peerConnection) {
                    const videoTrack = this.localStream.getVideoTracks()[0];
                    const sender = this.conn.peerConnection.getSenders().find(s => s.track.kind === videoTrack.kind);
                    if (sender) {
                        sender.replaceTrack(videoTrack);
                    }
                }
                this.showToast('Camera flipped', 'success');
            },

            copyObsLink() {
                const currentUrl = window.location.origin + window.location.pathname;
                const obsLink = `${currentUrl}?mode=receiver&room=${this.roomId}`;
                
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(obsLink);
                } else {
                    let textArea = document.createElement("textarea");
                    textArea.value = obsLink;
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try { document.execCommand('copy'); } catch (err) {}
                    document.body.removeChild(textArea);
                }
                
                this.showToast('OBS Link copied to clipboard!', 'success');
            },

            startReceiverMode() {
                const targetId = this.els.joinInput.value.trim().toLowerCase();
                if (!targetId) {
                    this.showToast('Please enter a Room ID', 'error');
                    return;
                }
                
                this.isSender = false;
                this.roomId = targetId;
                this.hideReceiverMenu();
                this.switchPage('page-receiver');
                this.initPeerServer();
            },

            initPeerServer(id = null) {
                this.peer = id ? new Peer(id) : new Peer();

                this.peer.on('open', (pid) => {
                    if (this.isSender) {
                        this.els.roomIdDisplay.innerText = pid;
                        this.updateSenderStatus("Awaiting OBS...", "bg-neon-cyan", true);
                    } else {
                        this.els.receiverStatusText.innerText = `Locating ${this.roomId}...`;
                        this.connectToSender();
                    }
                });

                if (this.isSender) {
                    // SENDER: Wait for ping
                    this.peer.on('connection', (conn) => {
                        conn.on('open', () => {
                            // Listen for the specific ping message
                            conn.on('data', (data) => {
                                if(data === 'ping') {
                                    this.updateSenderStatus("LIVE", "bg-neon-red", true);
                                    this.showToast('OBS Connected!', 'success');
                                    
                                    // Send video stream
                                    const call = this.peer.call(conn.peer, this.localStream);
                                    this.conn = call;
                                    
                                    call.on('close', () => {
                                        this.updateSenderStatus("OBS Disconnected", "bg-yellow-500", true);
                                        this.conn = null;
                                    });
                                }
                            });
                        });
                    });
                } else {
                    // RECEIVER: Answer incoming stream
                    this.peer.on('call', (call) => {
                        call.answer(); 
                        
                        call.on('stream', (remoteStream) => {
                            this.els.receiverStatusText.innerText = "Signal Acquired";
                            // Fade out loading screen smoothly
                            this.els.receiverLoading.style.opacity = '0';
                            setTimeout(() => {
                                this.els.receiverLoading.classList.add('hidden');
                                this.els.receiverLoading.style.opacity = '1';
                            }, 500);

                            this.els.receiverVideo.srcObject = remoteStream;
                            this.els.receiverVideo.muted = false;
                            this.els.receiverVideo.play().catch(e => {
                                this.els.receiverVideo.muted = true;
                                this.els.receiverVideo.play();
                            });
                        });

                        call.on('close', () => {
                            this.els.receiverLoading.classList.remove('hidden');
                            this.els.receiverStatusText.innerText = "Signal Lost. Reconnecting...";
                            this.els.receiverVideo.srcObject = null;
                            setTimeout(() => this.connectToSender(), 2000);
                        });
                    });
                }

                this.peer.on('error', (err) => {
                    console.error("PeerJS:", err);
                    if (err.type === 'peer-unavailable' || err.type === 'network') {
                        if (!this.isSender) {
                            this.els.receiverStatusText.innerText = "Host offline. Retrying...";
                            setTimeout(() => this.connectToSender(), 3000);
                        } else {
                            if (err.type === 'unavailable-id') {
                                this.showToast('ID taken, restarting...', 'error');
                                this.stopApp();
                            }
                        }
                    } else {
                        this.showToast('Connection Error: ' + err.type, 'error');
                    }
                });
            },

            connectToSender() {
                if (!this.peer || this.isSender || this.peer.destroyed) return;
                
                this.els.receiverStatusText.innerText = "Establishing Handshake...";
                const conn = this.peer.connect(this.roomId, { reliable: true });
                
                if (conn) {
                    conn.on('open', () => {
                        this.els.receiverStatusText.innerText = "Requesting Stream...";
                        conn.send('ping'); // Trigger video call from sender
                    });
                }
            },

            stopApp() {
                if (this.localStream) {
                    this.localStream.getTracks().forEach(track => track.stop());
                    this.localStream = null;
                }
                if (this.peer) {
                    this.peer.destroy();
                    this.peer = null;
                }
                this.hideReceiverMenu();
                this.switchPage('page-home');
                
                // Reset UI states
                this.els.roomIdDisplay.innerText = "----";
                this.els.receiverLoading.classList.remove('hidden');
                this.els.receiverVideo.srcObject = null;
                
                try {
                    window.history.pushState({}, document.title, window.location.pathname);
                } catch (e) {}
            },

            resetIdleTimer() {
                document.body.classList.remove('is-idle');
                clearTimeout(this.idleTimeout);
                this.idleTimeout = setTimeout(() => {
                    if (!this.isSender && document.getElementById('page-receiver').classList.contains('active')) {
                        document.body.classList.add('is-idle');
                    }
                }, 2500); // 2.5s for clean auto-hide
            }
        };

        // Initialize App
        window.addEventListener('DOMContentLoaded', () => app.init());

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SanDroCAM - Web Virtual Camera</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PeerJS for WebRTC P2P Communication -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
            overflow: hidden; /* Prevent scrolling */
        }

        /* Animasi Transisi Halaman */
        .page {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
            transform: scale(0.95);
            display: flex;
            flex-direction: column;
        }
        .page.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
            z-index: 10;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Video Styling */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #000;
        }
        .obs-mode video {
            object-fit: contain; /* Better for OBS */
        }

        /* Animasi Recording Pulse */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .recording-indicator {
            animation: pulse-red 2s infinite;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        /* Auto-hide UI in OBS mode when idle */
        .idle-hide {
            transition: opacity 0.5s ease;
        }
        .is-idle .idle-hide {
            opacity: 0 !important;
            pointer-events: none;
        }
    </style>
</head>
<body class="w-screen h-screen">

    <!-- Notifikasi Toast -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-300 opacity-0 -translate-y-5 pointer-events-none">
        <div class="glass-panel px-6 py-3 rounded-full shadow-lg text-sm font-semibold tracking-wide flex items-center gap-2">
            <span id="toast-icon">ℹ️</span>
            <span id="toast-message">Notifikasi</span>
        </div>
    </div>

    <!-- Halaman 1: Main Menu -->
    <div id="page-home" class="page active items-center justify-center p-6 bg-gradient-to-br from-slate-900 to-slate-800">
        <div class="max-w-md w-full glass-panel rounded-3xl p-8 text-center shadow-2xl relative overflow-hidden">
            <!-- Dekorasi -->
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
            <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
            
            <h1 class="text-5xl font-extrabold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">SanDroCAM</h1>
            <p class="text-slate-400 text-sm mb-8">Solusi Kamera OBS Berbasis Web. P2P & Responsif.</p>

            <div class="space-y-4">
                <button onclick="app.startSenderMode()" class="w-full group relative inline-flex items-center justify-center px-8 py-4 font-bold text-white transition-all duration-200 bg-blue-600 font-pj rounded-xl hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-600 overflow-hidden shadow-lg shadow-blue-500/30">
                    <span class="absolute w-0 h-0 transition-all duration-500 ease-out bg-white rounded-full group-hover:w-56 group-hover:h-56 opacity-10"></span>
                    <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Jadikan HP sbg Kamera
                </button>
                
                <button onclick="app.showReceiverMenu()" class="w-full group relative inline-flex items-center justify-center px-8 py-4 font-bold text-slate-200 transition-all duration-200 bg-slate-700 font-pj rounded-xl hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-700 shadow-lg">
                    <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    Terima Video (Monitor/OBS)
                </button>
            </div>
            
            <div id="receiver-input-section" class="hidden mt-6 pt-6 border-t border-slate-700">
                <p class="text-sm text-slate-400 mb-2">Masukkan Room ID dari HP:</p>
                <div class="flex gap-2">
                    <input type="text" id="join-room-id" placeholder="Cth: cam-12345" class="w-full px-4 py-3 bg-slate-800 border border-slate-600 rounded-xl focus:outline-none focus:border-blue-500 text-white uppercase text-center font-mono tracking-wider">
                    <button onclick="app.startReceiverMode()" class="px-6 bg-purple-600 hover:bg-purple-500 rounded-xl font-bold transition">Connect</button>
                </div>
            </div>
        </div>
        
        <div class="absolute bottom-6 text-slate-500 text-xs text-center w-full">
            Tips: Buka URL yang sama di HP dan PC Anda.
        </div>
    </div>

    <!-- Halaman 2: Mode Kamera (Sender) -->
    <div id="page-sender" class="page bg-black">
        <!-- Video Layer -->
        <video id="sender-video" autoplay playsinline muted></video>
        
        <!-- UI Overlay -->
        <div class="absolute inset-0 flex flex-col justify-between p-4 pointer-events-none z-20">
            <!-- Header Status -->
            <div class="flex justify-between items-start">
                <div class="glass-panel p-3 rounded-2xl pointer-events-auto max-w-[70%] shadow-lg">
                    <div class="flex items-center gap-2 mb-1">
                        <div id="sender-status-dot" class="w-3 h-3 rounded-full bg-yellow-500"></div>
                        <span id="sender-status-text" class="text-sm font-semibold">Menghubungkan Server...</span>
                    </div>
                    <div class="text-xs text-slate-400">Room ID (Koneksi Anda):</div>
                    <div class="flex items-center gap-2 mt-1">
                        <code id="sender-room-id" class="text-xl font-mono font-bold text-blue-400">------</code>
                    </div>
                </div>
                
                <button onclick="app.copyObsLink()" class="glass-panel p-3 rounded-full pointer-events-auto hover:bg-white/10 transition group" title="Copy Link untuk OBS">
                    <svg class="w-6 h-6 text-slate-200 group-hover:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                </button>
            </div>

            <!-- Bottom Controls -->
            <div class="flex justify-center gap-6 pb-6 pointer-events-auto">
                <button onclick="app.stopApp()" class="w-14 h-14 rounded-full bg-slate-800 border-2 border-slate-600 flex items-center justify-center hover:bg-slate-700 transition">
                    <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <button onclick="app.toggleCamera()" class="w-16 h-16 rounded-full glass-panel border border-slate-500 flex items-center justify-center hover:bg-white/10 transition shadow-xl">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Halaman 3: Mode Monitor (Receiver / OBS) -->
    <div id="page-receiver" class="page bg-black obs-mode">
        <!-- Video Layer (will receive remote stream) -->
        <video id="receiver-video" autoplay playsinline></video>
        
        <!-- Loading State -->
        <div id="receiver-loading" class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-black/80 backdrop-blur-sm idle-hide">
            <div class="w-16 h-16 border-4 border-slate-600 border-t-blue-500 rounded-full animate-spin mb-4"></div>
            <h2 id="receiver-status-text" class="text-xl font-bold text-white">Menunggu Video...</h2>
            <p class="text-slate-400 mt-2">Pastikan HP tetap menyala dan di halaman SanDroCAM</p>
        </div>

        <!-- Float Controls (Auto Hide) -->
        <div class="absolute top-4 right-4 z-20 flex gap-2 idle-hide">
            <div class="glass-panel px-4 py-2 rounded-full text-xs font-mono font-bold border border-green-500/30 text-green-400">
                LIVE P2P
            </div>
            <button onclick="app.stopApp()" class="glass-panel p-2 rounded-full hover:bg-red-500/20 text-slate-300 hover:text-red-400 transition" title="Keluar">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const app = {
            peer: null,
            conn: null,
            localStream: null,
            currentFacingMode: 'environment', // Default back camera
            isSender: false,
            roomId: null,
            idleTimeout: null,

            // Elements
            els: {
                pageHome: document.getElementById('page-home'),
                pageSender: document.getElementById('page-sender'),
                pageReceiver: document.getElementById('page-receiver'),
                senderVideo: document.getElementById('sender-video'),
                receiverVideo: document.getElementById('receiver-video'),
                roomIdDisplay: document.getElementById('sender-room-id'),
                senderStatusText: document.getElementById('sender-status-text'),
                senderStatusDot: document.getElementById('sender-status-dot'),
                receiverStatusText: document.getElementById('receiver-status-text'),
                receiverLoading: document.getElementById('receiver-loading'),
                receiverInputSec: document.getElementById('receiver-input-section'),
                joinInput: document.getElementById('join-room-id'),
                toast: document.getElementById('toast'),
                toastMsg: document.getElementById('toast-message'),
                toastIcon: document.getElementById('toast-icon')
            },

            init() {
                // Check if opened via OBS Link (URL parameters)
                const urlParams = new URLSearchParams(window.location.search);
                const mode = urlParams.get('mode');
                const room = urlParams.get('room');

                if (mode === 'receiver' && room) {
                    this.els.joinInput.value = room;
                    this.startReceiverMode();
                }

                // Setup idle cursor hiding for OBS
                document.addEventListener('mousemove', () => this.resetIdleTimer());
                document.addEventListener('touchstart', () => this.resetIdleTimer());
            },

            showToast(msg, type = 'info') {
                this.els.toastMsg.innerText = msg;
                this.els.toastIcon.innerText = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
                
                this.els.toast.classList.remove('opacity-0', '-translate-y-5');
                this.els.toast.classList.add('opacity-100', 'translate-y-0');
                
                setTimeout(() => {
                    this.els.toast.classList.remove('opacity-100', 'translate-y-0');
                    this.els.toast.classList.add('opacity-0', '-translate-y-5');
                }, 3000);
            },

            switchPage(pageId) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
            },

            showReceiverMenu() {
                this.els.receiverInputSec.classList.remove('hidden');
                this.els.joinInput.focus();
            },

            generateRoomId() {
                // Generate slightly longer random ID to prevent collisions (cam-x7y9z1)
                return 'cam-' + Math.random().toString(36).substring(2, 8);
            },

            // ==========================================
            // SENDER MODE (HP / Kamera)
            // ==========================================
            async startSenderMode() {
                this.isSender = true;
                this.roomId = this.generateRoomId();
                this.switchPage('page-sender');
                
                try {
                    await this.initLocalCamera();
                    this.initPeerServer(this.roomId);
                } catch (err) {
                    this.showToast('Gagal akses kamera: ' + err.message, 'error');
                    this.stopApp();
                }
            },

            async initLocalCamera() {
                if (this.localStream) {
                    this.localStream.getTracks().forEach(track => track.stop());
                }

                const constraints = {
                    video: {
                        facingMode: this.currentFacingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 30 }
                    },
                    audio: true // Send audio too
                };

                this.localStream = await navigator.mediaDevices.getUserMedia(constraints);
                this.els.senderVideo.srcObject = this.localStream;
                
                // Mirror if front camera
                if (this.currentFacingMode === 'user') {
                    this.els.senderVideo.style.transform = 'scaleX(-1)';
                } else {
                    this.els.senderVideo.style.transform = 'scaleX(1)';
                }
            },

            async toggleCamera() {
                this.currentFacingMode = this.currentFacingMode === 'environment' ? 'user' : 'environment';
                await this.initLocalCamera();
                
                // If already connected to peer, replace the track
                if (this.conn && this.conn.peerConnection) {
                    const videoTrack = this.localStream.getVideoTracks()[0];
                    const sender = this.conn.peerConnection.getSenders().find(s => s.track.kind === videoTrack.kind);
                    if (sender) {
                        sender.replaceTrack(videoTrack);
                    }
                }
                this.showToast('Kamera diputar', 'success');
            },

            copyObsLink() {
                const currentUrl = window.location.origin + window.location.pathname;
                const obsLink = `${currentUrl}?mode=receiver&room=${this.roomId}`;
                
                // Fallback for secure context if navigator.clipboard fails
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(obsLink);
                } else {
                    let textArea = document.createElement("textarea");
                    textArea.value = obsLink;
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try {
                        document.execCommand('copy');
                    } catch (err) {
                        console.error('Fallback: Oops, unable to copy', err);
                    }
                    document.body.removeChild(textArea);
                }
                
                this.showToast('Link OBS disalin! Paste di Browser Source.', 'success');
            },

            // ==========================================
            // RECEIVER MODE (PC / OBS)
            // ==========================================
            startReceiverMode() {
                const targetId = this.els.joinInput.value.trim().toLowerCase();
                if (!targetId) {
                    this.showToast('Masukkan Room ID', 'error');
                    return;
                }
                
                this.isSender = false;
                this.roomId = targetId;
                this.switchPage('page-receiver');
                this.initPeerServer(); // Receiver doesn't need specific ID, let PeerJS generate
            },

            // ==========================================
            // PEERJS WEBRTC LOGIC
            // ==========================================
            initPeerServer(id = null) {
                // Initialize PeerJS
                this.peer = id ? new Peer(id) : new Peer();

                this.peer.on('open', (pid) => {
                    if (this.isSender) {
                        this.els.roomIdDisplay.innerText = pid;
                        this.els.senderStatusText.innerText = "Menunggu Koneksi PC...";
                        this.els.senderStatusDot.className = "w-3 h-3 rounded-full bg-blue-500";
                    } else {
                        // If receiver, automatically ping the sender to trigger the video call
                        this.els.receiverStatusText.innerText = "Mencari HP (" + this.roomId + ")...";
                        this.connectToSender();
                    }
                });

                if (this.isSender) {
                    // SENDER: Listen for ping (data connection) from receiver
                    this.peer.on('connection', (conn) => {
                        // FIX: Menunggu data channel benar-benar 'open' sebelum memanggil peer.call
                        // Mencegah 'abort' race condition di signaling state.
                        conn.on('open', () => {
                            this.els.senderStatusText.innerText = "Tersambung (LIVE)";
                            this.els.senderStatusDot.className = "w-3 h-3 rounded-full bg-red-500 recording-indicator";
                            this.showToast('OBS Terhubung!', 'success');
                            
                            // Call back the receiver with local media stream
                            const call = this.peer.call(conn.peer, this.localStream);
                            this.conn = call;
                            
                            call.on('close', () => {
                                this.els.senderStatusText.innerText = "PC Terputus. Menunggu...";
                                this.els.senderStatusDot.className = "w-3 h-3 rounded-full bg-yellow-500";
                                this.conn = null;
                            });
                            
                            call.on('error', (err) => {
                                console.error("Call Error:", err);
                            });
                        });
                    });
                } else {
                    // RECEIVER: Listen for incoming media call from sender
                    this.peer.on('call', (call) => {
                        call.answer(); // Answer without sending stream
                        
                        call.on('stream', (remoteStream) => {
                            this.els.receiverStatusText.innerText = "Video Terhubung";
                            this.els.receiverLoading.classList.add('hidden');
                            this.els.receiverVideo.srcObject = remoteStream;
                            
                            // Unmute requirement for some browsers
                            this.els.receiverVideo.muted = false;
                            this.els.receiverVideo.play().catch(e => {
                                console.log("Autoplay prevented, keeping muted", e);
                                this.els.receiverVideo.muted = true;
                                this.els.receiverVideo.play();
                            });
                        });

                        call.on('close', () => {
                            this.els.receiverLoading.classList.remove('hidden');
                            this.els.receiverStatusText.innerText = "Koneksi Terputus. Reconnecting...";
                            this.els.receiverVideo.srcObject = null;
                            setTimeout(() => this.connectToSender(), 2000);
                        });
                    });
                }

                this.peer.on('error', (err) => {
                    console.error("PeerJS Error:", err);
                    
                    if (err.type === 'peer-unavailable' || err.type === 'network' || err.type === 'server-error') {
                        if (!this.isSender) {
                            this.els.receiverStatusText.innerText = "Kamera belum siap/ID Salah. Retrying...";
                            setTimeout(() => this.connectToSender(), 3000);
                        } else {
                            // If sender fails on initialization due to taken ID or network, notify
                            this.showToast('Koneksi bermasalah. Restarting...', 'error');
                            if (err.type === 'unavailable-id') {
                                this.stopApp();
                            }
                        }
                    } else {
                        this.showToast('Error koneksi: ' + err.type, 'error');
                    }
                });
            },

            connectToSender() {
                if (!this.peer || this.isSender || this.peer.destroyed) return;
                
                this.els.receiverStatusText.innerText = "Menghubungkan ke HP...";
                
                // Establish a data connection to "ping" the sender.
                const conn = this.peer.connect(this.roomId, { reliable: true });
                
                if (conn) {
                    conn.on('open', () => {
                        this.els.receiverStatusText.innerText = "Meminta Video...";
                        conn.send('ping'); // Pastikan ada data yang dikirim agar koneksi stabil
                    });
                }
            },

            // ==========================================
            // UTILITIES
            // ==========================================
            stopApp() {
                if (this.localStream) {
                    this.localStream.getTracks().forEach(track => track.stop());
                    this.localStream = null;
                }
                if (this.peer) {
                    this.peer.destroy();
                    this.peer = null;
                }
                this.switchPage('page-home');
                
                // Reset states
                this.els.roomIdDisplay.innerText = "------";
                this.els.receiverLoading.classList.remove('hidden');
                this.els.receiverVideo.srcObject = null;
                
                // Clear URL params if any (dibungkus dengan try-catch)
                try {
                    window.history.pushState({}, document.title, window.location.pathname);
                } catch (e) {
                    console.warn("Tidak dapat mengubah URL history (mengabaikan error di lingkungan blob/iframe):", e);
                }
            },

            resetIdleTimer() {
                document.body.classList.remove('is-idle');
                clearTimeout(this.idleTimeout);
                this.idleTimeout = setTimeout(() => {
                    if (!this.isSender && document.getElementById('page-receiver').classList.contains('active')) {
                        document.body.classList.add('is-idle');
                    }
                }, 3000); // Hide cursor and UI after 3 seconds of idle (good for OBS)
            }
        };

        // Initialize App on Load
        window.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

    </script>
</body>
</html>
